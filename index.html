<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ASESMEN SUMATIF</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    box-sizing:border-box;
}

body{
    margin:0;
    padding:0;

    font-family:'Poppins',sans-serif;

    background:
    linear-gradient(
        135deg,
        #0f172a,
        #1e3a8a,
        #2563eb
    );

    min-height:100vh;

    display:flex;
    flex-direction:column;
}

/* OVERLAY */

.overlay{

    background:
    linear-gradient(
        rgba(0,0,0,0.55),
        rgba(0,0,0,0.78)
    );

    min-height:100vh;

    display:flex;
    flex-direction:column;
}

/* HEADER */

header{

    background:
    rgba(255,255,255,0.08);

    backdrop-filter:blur(10px);

    color:white;

    text-align:center;

    padding:18px;

    border-bottom:
    1px solid rgba(255,255,255,0.1);
}

header h2{

    margin:0;

    font-size:28px;

    font-weight:700;
}

header h3{

    margin:6px 0;

    font-weight:400;

    opacity:0.9;
}

/* CONTENT */

.content{

    flex:1;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:20px;
}

/* CARD */

.card{

    width:100%;
    max-width:430px;

    background:
    rgba(255,255,255,0.12);

    backdrop-filter:blur(14px);

    border:
    1px solid rgba(255,255,255,0.15);

    border-radius:28px;

    padding:35px 28px;

    text-align:center;

    box-shadow:
    0 10px 35px rgba(0,0,0,0.4);

    animation:muncul 0.7s ease;
}

@keyframes muncul{

    from{
        opacity:0;
        transform:translateY(25px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ICON */

.icon{

    width:90px;
    height:90px;

    margin:auto;

    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:42px;

    background:
    linear-gradient(
        135deg,
        #60a5fa,
        #2563eb
    );

    box-shadow:
    0 0 25px rgba(96,165,250,0.6);

    margin-bottom:22px;
}

/* TITLE */

.card h2{

    color:white;

    margin-bottom:25px;

    font-size:28px;
}

/* INPUT */

input[type="text"]{

    width:100%;

    padding:18px;

    border:none;

    border-radius:16px;

    font-size:30px;

    text-align:center;

    text-transform:uppercase;

    outline:none;

    background:white;

    transition:0.3s;

    letter-spacing:5px;

    font-weight:bold;
}

input[type="text"]:focus{

    transform:scale(1.02);

    box-shadow:
    0 0 20px rgba(255,255,255,0.5);
}

/* BUTTON */

button{

    width:100%;

    margin-top:22px;

    padding:16px;

    border:none;

    border-radius:16px;

    background:
    linear-gradient(
        135deg,
        #22c55e,
        #16a34a
    );

    color:white;

    font-size:22px;

    font-weight:700;

    cursor:pointer;

    transition:0.3s;

    box-shadow:
    0 5px 18px rgba(34,197,94,0.35);
}

button:hover{

    transform:translateY(-2px);

    box-shadow:
    0 8px 22px rgba(34,197,94,0.45);
}

button:disabled{

    background:#888;

    box-shadow:none;

    cursor:not-allowed;
}

/* MESSAGE */

.message{

    margin-top:20px;

    color:#fff;

    font-size:17px;

    min-height:25px;

    font-weight:500;
}

.loading{
    color:#fde047;
}

.error{
    color:#fca5a5;
}

.success{
    color:#86efac;
}

/* FOOTER */

.footer{

    text-align:center;

    color:white;

    padding:18px;

    font-size:14px;

    opacity:0.8;
}

/* RESPONSIVE */

@media(max-width:600px){

    header h2{
        font-size:22px;
    }

    header h3{
        font-size:14px;
    }

    .card{
        padding:28px 20px;
    }

    .card h2{
        font-size:24px;
    }

    input[type="text"]{
        font-size:24px;
    }

    button{
        font-size:20px;
    }

}

</style>
</head>

<body>

<div class="overlay">

<header>

    <h2>ASESMEN SUMATIF SEMESTER 1</h2>

    <h3>KELAS 7, 8 DAN 9</h3>

    <h3>SMP NEGERI 6 PEMALANG</h3>

    <h3>TAHUN AJARAN 2025/2026</h3>

</header>

<div class="content">

    <div class="card">

        <div class="icon">
            🔐
        </div>

        <h2>MASUKKAN TOKEN</h2>

        <input
            type="text"
            id="kodeInput"
            maxlength="8"
            placeholder="TOKEN UJIAN"
            autocomplete="off"
        >

        <button
        id="btnMulai"
        onclick="cekKode()">

            MULAI UJIAN

        </button>

        <div
        class="message"
        id="message">

        </div>

    </div>

</div>

<div class="footer">
    © SMP Negeri 6 Pemalang
</div>

</div>

<script>

/* =========================
   URL WEB APP
========================= */

const API_URL =
"https://script.google.com/macros/s/AKfycbzpRYuD4QvZhD_lL9kevDxBiexCkVzYtDT0UiAq4JxehJkDMpW3VCNk0ElXkV1ax2kR/exec";

/* =========================
   LOCK REQUEST
========================= */

let sedangProses = false;

/* =========================
   CEK TOKEN
========================= */

async function cekKode(){

    // ✅ anti spam klik
    if(sedangProses) return;

    const kodeInput =
        document.getElementById("kodeInput");

    const kode =
        kodeInput.value
        .trim()
        .toUpperCase();

    const tombol =
        document.getElementById("btnMulai");

    // =========================
    // VALIDASI INTERNET
    // =========================
    if(!navigator.onLine){

        tampilPesan(
            "Tidak ada koneksi internet.",
            "error"
        );

        return;
    }

    // =========================
    // VALIDASI INPUT
    // =========================
    if(kode === ""){

        tampilPesan(
            "Token harus diisi.",
            "error"
        );

        return;
    }

    // =========================
    // MULAI PROSES
    // =========================
    sedangProses = true;
    tombol.disabled = true;

    tampilPesan(
        "Memeriksa token...",
        "loading"
    );

    try{

        const response =
            await fetch(
                API_URL +
                "?kode=" +
                encodeURIComponent(kode)
            );

        const data =
            await response.json();

        // =========================
        // TOKEN BENAR
        // =========================
        if(data.status){

            tampilPesan(

                "Token " +
                data.mapel +
                " benar. Mengalihkan...",

                "success"

            );

            setTimeout(() => {

                window.location.href =
                    data.url;

            },1000);

        }

        // =========================
        // TOKEN SALAH / KADALUARSA
        // =========================
        else{

            tampilPesan(
                "Token salah atau sudah kadaluarsa.",
                "error"
            );

            tombol.disabled = false;
            sedangProses = false;
        }

    }

    // =========================
    // ERROR SERVER
    // =========================
    catch(error){

        tampilPesan(
            "Server bermasalah.",
            "error"
        );

        tombol.disabled = false;
        sedangProses = false;
    }

}


/* =========================
   FORMAT INPUT OTOMATIS
========================= */

document
.getElementById("kodeInput")
.addEventListener("input", function(){

    this.value =
        this.value
        .toUpperCase()
        .replace(/[^A-Z0-9]/g,"");

});


/* =========================
   TAMPIL PESAN
========================= */

function tampilPesan(teks,kelas){

    const message =
        document.getElementById("message");

    message.className =
        `message ${kelas}`;

    message.innerHTML = teks;
}


/* =========================
   ENTER KEY
========================= */

document
.getElementById("kodeInput")
.addEventListener(
    "keypress",
    function(e){

        if(e.key === "Enter"){
            cekKode();
        }

    }
);


/* =========================
   ONLINE OFFLINE
========================= */

window.addEventListener(
    "offline",
    function(){

        tampilPesan(
            "Koneksi internet terputus.",
            "error"
        );

    }
);

window.addEventListener(
    "online",
    function(){

        tampilPesan(
            "Koneksi internet tersambung.",
            "success"
        );

        setTimeout(() => {

            document
            .getElementById("message")
            .innerHTML = "";

        },2000);

    }
);


/* =========================
   BLOK KLIK KANAN
========================= */

document.addEventListener(
    "contextmenu",
    function(e){
        e.preventDefault();
    }
);


/* =========================
   BLOK INSPECT SEDERHANA
========================= */

document.addEventListener(
    "keydown",
    function(e){

        if(
            e.key === "F12" ||
            (e.ctrlKey && e.shiftKey && e.key === "I") ||
            (e.ctrlKey && e.shiftKey && e.key === "J") ||
            (e.ctrlKey && e.key === "U")
        ){
            e.preventDefault();
        }

    }
);

</script>

</body>
</html>
